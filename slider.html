<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>15 Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e13;--panel:#12151d;--line:#232837;--ink:#e8e4d8;--dim:#6b7183;--x:#f4b942;--o:#5fd4c4}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;background:var(--bg);color:var(--ink);
  background-image:radial-gradient(600px 400px at 15% 10%,rgba(244,185,66,.07),transparent),
    radial-gradient(600px 400px at 85% 90%,rgba(95,212,196,.07),transparent);
  font-family:'IBM Plex Mono',monospace;
  display:flex;flex-direction:column;align-items:center;padding:24px;
}
.back{position:absolute;top:20px;left:24px;color:var(--dim);text-decoration:none;font-size:12px;text-transform:uppercase;letter-spacing:.12em}
.back:hover{color:var(--ink)}
h1{font-family:'Fraunces',serif;font-weight:300;font-size:42px;margin:48px 0 8px}
.status{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);margin-bottom:20px}
.status b{color:var(--x);font-weight:500}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tile{width:min(18vw,72px);height:min(18vw,72px);border-radius:12px;border:1px solid var(--line);background:#1a1e29;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:20px;cursor:pointer;transition:background .12s,transform .08s;padding:0}
.tile:active{transform:scale(.96)}
.tile.home{background:#2b2513;border-color:rgba(244,185,66,.4);color:var(--x)}
.tile.empty{background:transparent;border:1px dashed var(--line);cursor:default}
.board.won .tile{background:#173832;border-color:var(--o);color:var(--o)}
.bar{display:flex;justify-content:center;margin-top:22px}
button.pill{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:9px 22px;font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.14em;cursor:pointer}
button.pill:hover{border-color:var(--dim)}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Arcade</a>
<h1>15 Puzzle</h1>
<div class="status" id="status">Moves <b id="moves">0</b></div>
<div class="card">
  <div class="board" id="board"></div>
  <div class="bar"><button class="pill" id="shuffle">Shuffle</button></div>
</div>
<script>
const N=4;
const board=document.getElementById('board');
const movesEl=document.getElementById('moves');
const statusEl=document.getElementById('status');
let tiles,blank,moves,won;
const btns=[];
for(let i=0;i<N*N;i++){
  const b=document.createElement('button');b.className='tile';
  b.addEventListener('click',()=>tryMove(i));
  board.appendChild(b);btns.push(b);
}
function neighbors(i){
  const r=Math.floor(i/N),c=i%N,out=[];
  if(r>0)out.push(i-N);if(r<N-1)out.push(i+N);
  if(c>0)out.push(i-1);if(c<N-1)out.push(i+1);
  return out;
}
function tryMove(i){
  if(won||!neighbors(i).includes(blank))return;
  tiles[blank]=tiles[i];tiles[i]=0;blank=i;
  moves++;render();
  if(tiles.every((v,k)=>v===(k+1)%(N*N))){
    won=true;board.classList.add('won');
    statusEl.firstChild.textContent='Solved in ';
    statusEl.append(' moves!');
  }
}
function render(){
  btns.forEach((b,i)=>{
    const v=tiles[i];
    b.textContent=v||'';
    b.classList.toggle('empty',!v);
    b.classList.toggle('home',v!==0&&v===i+1);
  });
  movesEl.textContent=moves;
}
function shuffle(){
  tiles=[...Array(N*N-1).keys()].map(v=>v+1).concat(0);
  blank=N*N-1;won=false;board.classList.remove('won');
  // always solvable: random legal moves from solved state
  let prev=-1;
  for(let k=0;k<250;k++){
    const opts=neighbors(blank).filter(j=>j!==prev);
    const j=opts[Math.floor(Math.random()*opts.length)];
    prev=blank;
    tiles[blank]=tiles[j];tiles[j]=0;blank=j;
  }
  moves=0;
  statusEl.innerHTML='';
  statusEl.append('Moves ',movesEl);
  render();
}
document.getElementById('shuffle').addEventListener('click',shuffle);
shuffle();
</script>
</body>
</html>
