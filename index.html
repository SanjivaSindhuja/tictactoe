<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Midnight Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e13;--panel:#12151d;--line:#232837;--ink:#e8e4d8;--dim:#6b7183;--x:#f4b942;--o:#5fd4c4}
*{box-sizing:border-box;margin:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;padding:40px 20px 60px;
background-image:radial-gradient(800px 500px at 10% -5%,rgba(244,185,66,.07),transparent),radial-gradient(800px 500px at 90% 105%,rgba(95,212,196,.07),transparent)}
header{text-align:center;margin-bottom:40px}
h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(2.4rem,7vw,4rem)}
.sub{color:var(--dim);font-size:13px;text-transform:uppercase;letter-spacing:.18em;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;max-width:1100px;margin:0 auto}
.card{display:block;text-decoration:none;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5);padding:22px 18px;transition:transform .2s,border-color .2s,box-shadow .2s;
opacity:0;animation:fadein .5s ease forwards}
.card:nth-child(n){animation-delay:calc(var(--i)*60ms)}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card:hover{transform:translateY(-4px)}
.card:nth-child(odd):hover{border-color:var(--x);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 24px rgba(244,185,66,.25)}
.card:nth-child(even):hover{border-color:var(--o);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 24px rgba(95,212,196,.25)}
.glyph{font-size:2rem}
.title{font-family:'Fraunces',serif;font-weight:300;font-size:1.4rem;margin:10px 0 6px}
.desc{color:var(--dim);font-size:12px;line-height:1.5}
</style>
<header>
  <h1>Midnight Arcade</h1>
  <div class="sub">20 tiny games · zero dependencies</div>
</header>
<div class="grid" id="grid"></div>
<script>
const GAMES=[
["tictactoe.html","Tic Tac Toe","❌","Three in a row, oldest trick in the book."],
["snake.html","Snake","🐍","Eat, grow, don't bite yourself."],
["2048.html","2048","🔢","Slide tiles, double up, chase 2048."],
["minesweeper.html","Minesweeper","💣","Flag the bombs, clear the field."],
["memory.html","Memory Match","🃏","Flip pairs, train your recall."],
["pong.html","Pong","🏓","The original — paddle vs paddle."],
["breakout.html","Breakout","🧱","Smash every brick with one ball."],
["flappy.html","Flappy","🐤","Tap to flap, thread the gaps."],
["dino.html","Dino Run","🦖","Jump the cacti, outrun the void."],
["simon.html","Simon","🎵","Watch, remember, repeat the pattern."],
["whack.html","Whack-a-Mole","🔨","Fast hands beat sneaky moles."],
["lightsout.html","Lights Out","💡","Toggle till the board goes dark."],
["slider.html","15 Puzzle","🧩","Slide the tiles back into order."],
["hangman.html","Hangman","🪢","Guess letters, save the stick figure."],
["wordle.html","Wordle","🟩","Five letters, six guesses."],
["connect4.html","Connect Four","🔴","Drop discs, line up four."],
["rps.html","Rock Paper Scissors","✂️","Best the machine's mind games."],
["tetris.html","Tetris","🕹️","Stack tetrominoes, clear the lines."],
["reaction.html","Reaction Test","⚡","Click the teal — how fast are you?"],
["typing.html","Typing Test","⌨️","30 seconds, live WPM and accuracy."]];
document.getElementById('grid').innerHTML=GAMES.map(([f,t,g,d],i)=>
 `<a class="card" style="--i:${i}" href="${f}"><div class="glyph">${g}</div><div class="title">${t}</div><div class="desc">${d}</div></a>`).join('');
</script>
