<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e13;--panel:#12151d;--line:#232837;--ink:#e8e4d8;--dim:#6b7183;--x:#f4b942;--o:#5fd4c4}
*{box-sizing:border-box;margin:0}
body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:24px 16px;
background-image:radial-gradient(600px 400px at 15% 10%,rgba(244,185,66,.07),transparent 70%),radial-gradient(600px 400px at 85% 90%,rgba(95,212,196,.07),transparent 70%)}
.back{align-self:flex-start;color:var(--dim);text-decoration:none;font-size:12px;text-transform:uppercase;letter-spacing:.12em}
.back:hover{color:var(--ink)}
h1{font-family:'Fraunces',serif;font-weight:300;font-size:2.4rem;margin:14px 0 6px}
.status{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--dim);margin-bottom:14px}
.status b{color:var(--x);font-weight:500}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.55);padding:16px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(60px,80px));gap:10px}
.tile{aspect-ratio:1;perspective:400px;cursor:pointer}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .35s}
.tile.flip .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,6vw,32px)}
.front{background:#171b26}
.front::after{content:'?';color:var(--dim);font-size:16px}
.backf{background:#0e1118;transform:rotateY(180deg)}
.tile.matched .backf{border-color:var(--o);box-shadow:0 0 10px rgba(95,212,196,.25)}
button{background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:999px;text-transform:uppercase;font-family:inherit;font-size:12px;letter-spacing:.12em;padding:8px 20px;cursor:pointer}
button:hover{border-color:var(--o);color:var(--o)}
.bar{margin-top:14px;display:flex;justify-content:center}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Arcade</a>
<h1>Memory</h1>
<div class="status">Moves <b id="moves">0</b> &middot; <span id="msg">Find all 8 pairs</span></div>
<div class="card">
<div class="grid" id="grid"></div>
<div class="bar"><button id="restart">Restart</button></div>
</div>
<script>
const EMOJI=['🦊','🐙','🌵','🍋','🎈','🪐','🍄','⚡'];
const gridEl=document.getElementById('grid');
let first,lock,moves,matches;
function reset(){
  first=null;lock=false;moves=0;matches=0;
  const deck=[...EMOJI,...EMOJI];
  for(let i=deck.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[deck[i],deck[j]]=[deck[j],deck[i]]}
  gridEl.innerHTML='';
  deck.forEach(e=>{
    const t=document.createElement('div');t.className='tile';
    t.innerHTML=`<div class="inner"><div class="face front"></div><div class="face backf">${e}</div></div>`;
    t.dataset.e=e;
    t.addEventListener('click',()=>pick(t));
    gridEl.appendChild(t);
  });
  hud('Find all 8 pairs');
}
function hud(m){document.getElementById('moves').textContent=moves;document.getElementById('msg').textContent=m}
function pick(t){
  if(lock||t.classList.contains('flip'))return;
  t.classList.add('flip');
  if(!first){first=t;return}
  moves++;
  if(first.dataset.e===t.dataset.e){
    first.classList.add('matched');t.classList.add('matched');
    matches++;first=null;
    hud(matches===8?`You win in ${moves} moves!`:'');
  }else{
    lock=true;
    const a=first;first=null;
    setTimeout(()=>{a.classList.remove('flip');t.classList.remove('flip');lock=false;hud('')},700);
  }
}
document.getElementById('restart').onclick=reset;
reset();
</script>
</body>
</html>
