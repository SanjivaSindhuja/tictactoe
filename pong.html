<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pong — Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0e13;--panel:#12151d;--line:#232837;--ink:#e8e4d8;--dim:#6b7183;--x:#f4b942;--o:#5fd4c4}
*{margin:0;box-sizing:border-box}
body{
  background:var(--bg) radial-gradient(600px 400px at 15% 10%,rgba(244,185,66,.07),transparent 70%),
  radial-gradient(600px 400px at 85% 90%,rgba(95,212,196,.07),transparent 70%);
  background-color:var(--bg);color:var(--ink);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;padding:16px}
.back{position:fixed;top:16px;left:20px;color:var(--dim);text-decoration:none;
  font-size:12px;text-transform:uppercase;letter-spacing:.15em}
.back:hover{color:var(--ink)}
h1{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(28px,5vw,42px);margin-bottom:8px}
.status{font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:var(--dim);margin-bottom:16px;min-height:1.2em}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;
  padding:16px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
canvas{display:block;max-width:100%;height:auto;touch-action:none;border-radius:8px}
button{margin-top:16px;background:transparent;color:var(--ink);border:1px solid var(--line);
  border-radius:999px;padding:10px 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;
  text-transform:uppercase;letter-spacing:.15em;cursor:pointer}
button:hover{border-color:var(--x)}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Arcade</a>
<h1>Pong</h1>
<div class="status" id="status">First to 7 &middot; Move your paddle</div>
<div class="card"><canvas id="c" width="640" height="400"></canvas></div>
<button id="btn">Restart</button>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=640,H=400,PW=10,PH=70,BR=7,WIN=7;
const css=s=>getComputedStyle(document.documentElement).getPropertyValue(s).trim();
const AMBER=css('--x'),TEAL=css('--o'),INK=css('--ink'),DIM=css('--dim');
let player,ai,ball,score,over,msg='';

function resetBall(dir){
  ball={x:W/2,y:H/2,vx:dir*4.5,vy:(Math.random()*4-2)||1.5};
}
function reset(){
  player={y:H/2-PH/2};ai={y:H/2-PH/2};score=[0,0];over=false;msg='';
  resetBall(Math.random()<.5?1:-1);
  status('First to 7 · Move your paddle');
}
function status(t){document.getElementById('status').textContent=t;}

function movePaddle(clientY){
  const r=cv.getBoundingClientRect();
  const y=(clientY-r.top)*(H/r.height);
  player.y=Math.max(0,Math.min(H-PH,y-PH/2));
}
cv.addEventListener('mousemove',e=>movePaddle(e.clientY));
cv.addEventListener('touchmove',e=>{e.preventDefault();movePaddle(e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchstart',e=>{e.preventDefault();movePaddle(e.touches[0].clientY);},{passive:false});
document.getElementById('btn').onclick=reset;

function update(){
  if(over)return;
  ball.x+=ball.vx;ball.y+=ball.vy;
  // walls
  if(ball.y-BR<0){ball.y=BR;ball.vy*=-1;}
  if(ball.y+BR>H){ball.y=H-BR;ball.vy*=-1;}
  // player paddle (left, x=20..20+PW)
  if(ball.vx<0&&ball.x-BR<20+PW&&ball.x-BR>20-8&&ball.y>player.y&&ball.y<player.y+PH){
    ball.x=20+PW+BR;ball.vx=Math.min(11,-ball.vx*1.05);
    ball.vy+=((ball.y-(player.y+PH/2))/(PH/2))*3;
  }
  // ai paddle (right)
  const ax=W-20-PW;
  if(ball.vx>0&&ball.x+BR>ax&&ball.x+BR<ax+PW+8&&ball.y>ai.y&&ball.y<ai.y+PH){
    ball.x=ax-BR;ball.vx=Math.max(-11,-ball.vx*1.05);
    ball.vy+=((ball.y-(ai.y+PH/2))/(PH/2))*3;
  }
  // score
  if(ball.x<-BR){score[1]++;point();}
  else if(ball.x>W+BR){score[0]++;point();}
  // simple AI: track ball with capped speed
  const target=ball.y-PH/2;
  ai.y+=Math.max(-4.2,Math.min(4.2,(target-ai.y)*.12));
  ai.y=Math.max(0,Math.min(H-PH,ai.y));
}
function point(){
  if(score[0]>=WIN||score[1]>=WIN){
    over=true;msg=score[0]>=WIN?'You win!':'AI wins';
    status(msg+' · Restart to play again');
  }else resetBall(score[0]>score[1]?-1:1);
  if(!over)status('First to 7');
}
function draw(){
  ctx.fillStyle='#0c0e13';ctx.fillRect(0,0,W,H);
  // net
  ctx.strokeStyle=css('--line');ctx.setLineDash([6,10]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // scores
  ctx.font='300 44px Fraunces,serif';ctx.textAlign='center';
  ctx.fillStyle=AMBER;ctx.fillText(score[0],W/2-60,54);
  ctx.fillStyle=TEAL;ctx.fillText(score[1],W/2+60,54);
  // paddles
  ctx.fillStyle=AMBER;ctx.fillRect(20,player.y,PW,PH);
  ctx.fillStyle=TEAL;ctx.fillRect(W-20-PW,ai.y,PW,PH);
  // ball
  ctx.fillStyle=INK;ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,7);ctx.fill();
  if(over){
    ctx.fillStyle='rgba(12,14,19,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=INK;ctx.font='300 36px Fraunces,serif';
    ctx.fillText(msg,W/2,H/2);
  }
}
const STEP=1000/60;let _p,_a=0;function loop(ts){if(_p===undefined)_p=ts;_a+=Math.min(ts-_p,250);_p=ts;while(_a>=STEP){update();_a-=STEP;}draw();requestAnimationFrame(loop);}
reset();requestAnimationFrame(loop);
</script>
</body>
</html>
